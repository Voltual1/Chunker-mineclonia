name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 保持完整历史记录以便获取版本信息

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ github.workspace }}/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle.kts', '**/settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $ENCODED_STRING | base64 -d > android/tag_keystore.p12

      # - name: Apply Chunker Android Patches
      #   run: |
      #     echo "正在应用自动化补丁脚本..."
      #     python3 patch_chunker.py
      #     echo "所有补丁应用完成！"

      - name: Comment out System.exit in Java files
        run: |
          echo "开始检索并注释 System.exit..."
          find . -name "*.java" -exec sed -i -E 's/(System\.exit\s*\([^)]*\)\s*;?)/\/\/ \1/g' {} +
          echo "替换完成！"

      - name: Fix StringBuilder.isEmpty in Specific Files
        run: |
          echo "开始精准修复指定文件的 StringBuilder.isEmpty()..."
          
          # 定义需要修复的文件名列表
          TARGET_FILES=("ChunkerBlockIdentifier.java" "FontUtil.java")
          
          for FILE_NAME in "${TARGET_FILES[@]}"; do
              echo "正在查找文件: $FILE_NAME ..."
              FILE_PATH=$(find . -name "$FILE_NAME" | head -n 1)
              
              if [ -n "$FILE_PATH" ]; then
                  echo "找到目标文件: $FILE_PATH，开始替换..."
                  # 匹配 !变量名.isEmpty() 并替换为 变量名.length() > 0
                  sed -i -E 's/!([a-zA-Z0-9_]+)\.isEmpty\(\)/\1.length() > 0/g' "$FILE_PATH"
                  # 匹配 变量名.isEmpty() 并替换为 变量名.length() == 0
                  sed -i -E 's/([a-zA-Z0-9_]+)\.isEmpty\(\)/\1.length() == 0/g' "$FILE_PATH"
                  echo "$FILE_NAME 修改完毕！"
              else
                  echo "错误: 未找到文件 $FILE_NAME，请检查项目结构！"
                  exit 1
              fi
          done
          echo "所有指定文件修复完成！"
          
      - name: Build with Gradle
        run: ./gradlew assembleDebug
        env:
          KEYSTORE_PATH: tag_keystore.p12
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get version info
        id: version
        shell: bash
        run: |
          echo "BUILD_VERSION=auto-build-$(date +%Y%m%d_%H%M%S)-${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.BUILD_VERSION }}
          name: "Auto Build ${{ steps.version.outputs.BUILD_VERSION }}"
          body: |
            ### 构建信息
            - 提交: `${{ github.sha }}`
            - 构建时间: `${{ steps.version.outputs.TIMESTAMP }}`

            **注意**: Release 包含 Release 和 Debug 两种 APK。
          draft: true
          files: |
            android/build/outputs/apk/debug/*.apk
            android/build/outputs/apk/release/*.apk
            android/build/outputs/mapping/release/mapping.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Gradle cache
        if: success()
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ github.workspace }}/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle.kts', '**/settings.gradle.kts') }}