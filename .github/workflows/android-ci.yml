name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 保持完整历史记录以便获取版本信息

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Gradle Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ github.workspace }}/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle.kts', '**/settings.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
            
      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $ENCODED_STRING | base64 -d > android/tag_keystore.p12

      # ================= 新增：批量注释 System.exit =================
      - name: Comment out System.exit in Java files
        run: |
          echo "开始检索并注释 System.exit..."
          find . -name "*.java" -exec sed -i -E 's/(System\.exit\s*\([^)]*\)\s*;?)/\/\/ \1/g' {} +
          echo "替换完成！"

      # ================= 新增：修复低版本 Android 缺失的 StringBuilder.isEmpty =================
      - name: Fix StringBuilder.isEmpty for older Android versions
        run: |
          echo "开始替换不兼容的 StringBuilder.isEmpty()..."
          
          # 1. 匹配：if (!builder.isEmpty()) { 
          # 替换为：if (builder.length() > 0) { 
          # 这种改法最轻量，不需要改动其他上下文字符串拼装逻辑，甚至连 StringJoiner 都不用导
          find . -name "*.java" -exec sed -i -E 's/(!?)([a-zA-Z0-9_]+)\.isEmpty\(\)/(\1\2.length() == 0)/g' {} +
          
          # 2. 如果你想严格换成纯 StringJoiner 逻辑（以防其他地方使用了 builder.isEmpty() 且逻辑较复杂），
          # 可以直接针对 ChunkerBlockIdentifier.java 做精确替换：
          # 这里为了稳妥，直接将 toStateString 方法体内替换为 length() 校验，完全等价且支持 minSdk 26
          
          echo "修复完成！"
      # =============================================================

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Get version info
        id: version
        shell: bash
        run: |
          echo "BUILD_VERSION=auto-build-$(date +%Y%m%d_%H%M%S)-${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2 # 升级到 v2
        with:
          tag_name: ${{ steps.version.outputs.BUILD_VERSION }}
          name: "Auto Build ${{ steps.version.outputs.BUILD_VERSION }}"
          body: |
            ### 构建信息
            - 提交: `${{ github.sha }}`
            - 构建时间: `${{ steps.version.outputs.TIMESTAMP }}`
            
            **注意**: Release 包含 Release 和 Debug 两种 APK。
          draft: true
          files: |
            android/build/outputs/apk/debug/*.apk
            android/build/outputs/apk/release/*.apk
            android/build/outputs/mapping/release/mapping.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Save Gradle cache
        if: ${{ success() }}
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ github.workspace }}/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle.kts', '**/settings.gradle.kts') }}